<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Settings · AI 电商视觉控制台</title>
  <link rel="stylesheet" href="/static/css/landing.css">
  <style>
    body.settings-page {
      min-height: 100dvh;
      padding: 20px;
    }
    .settings-shell {
      width: min(100%, 1240px);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .settings-card,
    .settings-empty,
    .mode-hero {
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
    }
    .settings-login {
      padding: 22px;
      display: grid;
      gap: 16px;
      max-width: 560px;
      margin: 0 auto;
    }
    .settings-login-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .settings-login-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .settings-login-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .login-status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .login-status.is-success {
      color: #166534;
    }
    .login-status.is-error {
      color: #b91c1c;
    }
    .settings-content {
      display: grid;
      gap: 16px;
    }
    .mode-hero {
      padding: 22px;
      display: grid;
      gap: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(248,250,252,0.88));
    }
    .mode-hero-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .mode-hero-meta {
      display: grid;
      gap: 10px;
    }
    .mode-hero-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .mode-hero-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 72ch;
    }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: rgba(255,255,255,0.84);
      color: var(--muted-strong);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .mode-badge strong {
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .mode-hero-side {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: min(100%, 220px);
    }
    .mode-status-card {
      width: 100%;
      min-height: 120px;
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 10px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(255,255,255,0.82);
    }
    .mode-status-card[data-mode="mode1"] {
      background: linear-gradient(135deg, rgba(226, 232, 240, 0.82), rgba(255,255,255,0.92));
    }
    .mode-status-card[data-mode="mode2"] {
      background: linear-gradient(135deg, rgba(219, 234, 254, 0.92), rgba(255,255,255,0.96));
    }
    .mode-status-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .mode-status-value {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: var(--text);
    }
    .mode-status-note {
      color: var(--muted-strong);
      line-height: 1.6;
      font-size: 13px;
    }
    .mode-hero-controls {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }
    .mode-hero-hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
    }
    .settings-status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .settings-status.is-success {
      color: #166534;
    }
    .settings-status.is-error {
      color: #b91c1c;
    }
    .btn {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,1);
    }
    .btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
    }
    .btn.primary {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }
    .btn.primary:hover:not(:disabled) {
      background: #0f172a;
    }
    .btn.is-idle {
      background: rgba(255,255,255,0.9);
      color: var(--muted-strong);
      border-color: var(--line-strong);
    }
    .btn.is-idle:hover:not(:disabled) {
      background: rgba(255,255,255,1);
    }
    .settings-list {
      display: grid;
      gap: 14px;
    }
    .settings-empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    .setting-row {
      padding: 18px;
      display: grid;
      gap: 16px;
    }
    .setting-meta {
      display: grid;
      gap: 8px;
    }
    .setting-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .setting-scope,
    .setting-key,
    .setting-sensitive,
    .setting-updated {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.74);
    }
    .setting-key {
      font-weight: 700;
      color: var(--text);
    }
    .setting-sensitive {
      color: #7c3aed;
      border-color: rgba(124,58,237,0.16);
      background: rgba(124,58,237,0.08);
    }
    .setting-updated {
      color: var(--muted);
    }
    .setting-description {
      color: var(--muted);
      line-height: 1.6;
    }
    .setting-editor {
      display: grid;
      gap: 12px;
    }
    .inline-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .setting-field {
      display: grid;
      gap: 8px;
    }
    .field-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .setting-input {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      font: inherit;
    }
    .setting-input[readonly] {
      color: var(--muted-strong);
      background: rgba(248,250,252,0.9);
    }
    .setting-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .setting-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    @media (max-width: 860px) {
      .inline-grid {
        grid-template-columns: 1fr;
      }
      .mode-hero-controls {
        grid-template-columns: 1fr;
      }
      .mode-hero-top {
        align-items: stretch;
      }
      .setting-actions,
      .mode-hero-side,
      .settings-login-actions {
        justify-content: flex-start;
        justify-items: stretch;
      }
    }
  </style>
</head>
<body class="settings-page" data-page-mode="settings">
  <div class="settings-shell">
    <section class="settings-card settings-login" id="loginGate" hidden>
      <div class="mode-badge">Admin Access <strong>settings</strong></div>
      <h1 class="settings-login-title">登录管理员账号</h1>
      <p class="settings-login-copy">当前设置页需要管理员登录后才会加载 APP_MODE 与其他配置。请输入已写入环境变量的手机号或邮箱，以及对应密码。</p>
      <div class="inline-grid">
        <label class="setting-field">
          <span class="field-label">identifier</span>
          <input class="setting-input" id="adminIdentifier" type="text" placeholder="管理员手机号或邮箱" autocomplete="username">
        </label>
        <label class="setting-field">
          <span class="field-label">password</span>
          <input class="setting-input" id="adminPassword" type="password" placeholder="管理员密码" autocomplete="current-password">
        </label>
      </div>
      <div class="settings-login-actions">
        <button class="btn primary" id="adminLoginBtn" type="button">登录并加载设置</button>
      </div>
      <div class="login-status" id="loginStatus" aria-live="polite"></div>
    </section>

    <div class="settings-content" id="settingsContent" hidden>
      <section class="mode-hero" id="appModeHero" aria-live="polite">
        <div class="mode-hero-top">
          <div class="mode-hero-meta">
            <div class="mode-badge">Application Mode <strong id="appModeBadge">mode1</strong></div>
            <h2 class="mode-hero-title">当前运行模式</h2>
            <p class="mode-hero-copy" id="appModeDescription">mode1 适合稳定的默认生成链路，通常用于常规套图、A+ 与服饰工作流。</p>
          </div>
          <div class="mode-hero-side">
            <div class="mode-status-card" id="appModeStatusCard" data-mode="mode1">
              <div class="mode-status-label">Current active mode</div>
              <div class="mode-status-value" id="appModeValue">mode1</div>
              <div class="mode-status-note" id="appModeNote">稳定模式，适合日常生产使用。</div>
            </div>
          </div>
        </div>
        <div class="mode-hero-controls">
          <label class="setting-field">
            <span class="field-label">APP_MODE</span>
            <select class="setting-input" id="appModeSelect" autocomplete="off">
              <option value="mode1">mode1</option>
              <option value="mode2">mode2</option>
            </select>
          </label>
          <button class="btn primary is-idle" id="appModeSaveBtn" type="button">当前已生效</button>
        </div>
        <div class="settings-status" id="status" aria-live="polite"></div>
        <p class="mode-hero-hint">保存模式后会自动刷新并重新读取数据库与后端 settings cache。</p>
      </section>

      <main class="settings-list" id="settingsList" aria-live="polite"></main>

      <section class="settings-empty" id="emptyState" hidden>
        当前 scope 下没有可显示的配置项。
      </section>
    </div>
  </div>

  <script>
    const DEFAULT_SCOPE = 'global';
    const APP_MODE_CONFIG = {
      mode1: {
        description: 'mode1 适合稳定的默认生成链路，通常用于常规套图、A+ 与服饰工作流。',
        note: '稳定模式，适合日常生产使用。',
      },
      mode2: {
        description: 'mode2 会启用新的图像生成链路，可根据是否上传参考图自动切换文生图与图生图能力。',
        note: '实验与增强模式，适合验证新模型与新流程。',
      },
    };

    const state = {
      scope: DEFAULT_SCOPE,
      records: [],
      appModeRecord: null,
      appModeOriginalValue: 'mode1',
      loadFailed: false,
      loadErrorMessage: '',
      authRequired: document.body.dataset.authRequired === 'true',
    };

    const loginGate = document.getElementById('loginGate');
    const settingsContent = document.getElementById('settingsContent');
    const loginStatusEl = document.getElementById('loginStatus');
    const adminIdentifierInput = document.getElementById('adminIdentifier');
    const adminPasswordInput = document.getElementById('adminPassword');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const statusEl = document.getElementById('status');
    const settingsList = document.getElementById('settingsList');
    const emptyState = document.getElementById('emptyState');
    const appModeHero = document.getElementById('appModeHero');
    const appModeBadge = document.getElementById('appModeBadge');
    const appModeValue = document.getElementById('appModeValue');
    const appModeDescription = document.getElementById('appModeDescription');
    const appModeNote = document.getElementById('appModeNote');
    const appModeStatusCard = document.getElementById('appModeStatusCard');
    const appModeSelect = document.getElementById('appModeSelect');
    const appModeSaveBtn = document.getElementById('appModeSaveBtn');

    function setStatus(message, type = '') {
      statusEl.className = `settings-status${type ? ` is-${type}` : ''}`;
      statusEl.textContent = message || '';
    }

    function setLoginStatus(message, type = '') {
      loginStatusEl.className = `login-status${type ? ` is-${type}` : ''}`;
      loginStatusEl.textContent = message || '';
    }

    function showLoginGate(message = '', type = '') {
      settingsContent.hidden = true;
      loginGate.hidden = false;
      setLoginStatus(message, type);
    }

    function showSettingsContent() {
      loginGate.hidden = true;
      settingsContent.hidden = false;
      setLoginStatus('');
    }

    function isSensitive(key) {
      return /KEY|SECRET|TOKEN|PASSWORD|PASS|PRIVATE/i.test(key || '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeAppMode(value) {
      return ['mode1', 'mode2'].includes(String(value || '').trim().toLowerCase()) ? String(value).trim().toLowerCase() : 'mode1';
    }

    function updateAppModeHero(mode) {
      const normalizedMode = normalizeAppMode(mode);
      const config = APP_MODE_CONFIG[normalizedMode] || APP_MODE_CONFIG.mode1;
      appModeBadge.textContent = normalizedMode;
      appModeValue.textContent = normalizedMode;
      appModeDescription.textContent = config.description;
      appModeNote.textContent = config.note;
      appModeStatusCard.dataset.mode = normalizedMode;
    }

    function syncAppModeControls() {
      const currentValue = normalizeAppMode(appModeSelect.value);
      const originalValue = normalizeAppMode(state.appModeOriginalValue);
      const dirty = currentValue !== originalValue;
      updateAppModeHero(currentValue);
      appModeSaveBtn.disabled = false;
      if (state.loadFailed) {
        appModeSaveBtn.textContent = '重新加载设置';
        appModeSaveBtn.classList.remove('is-idle');
        return;
      }
      if (!state.appModeRecord) {
        appModeSaveBtn.textContent = '未找到 APP_MODE';
        appModeSaveBtn.classList.remove('is-idle');
        return;
      }
      appModeSaveBtn.textContent = dirty ? '保存模式' : '当前已生效';
      appModeSaveBtn.classList.toggle('is-idle', !dirty);
    }

    function hydrateAppModeRecord(records) {
      const appModeRecord = Array.isArray(records)
        ? records.find((record) => record && record.scope === state.scope && record.setting_key === 'APP_MODE') || null
        : null;

      state.appModeRecord = appModeRecord;
      const currentMode = normalizeAppMode(appModeRecord?.setting_value || 'mode1');
      state.appModeOriginalValue = currentMode;
      appModeSelect.value = currentMode;
      appModeHero.hidden = false;
      syncAppModeControls();
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        headers: {
          'Accept': 'application/json',
          ...(options.headers || {}),
        },
        ...options,
      });
      let data = null;
      try {
        data = await response.json();
      } catch (error) {
        data = null;
      }
      return { response, data };
    }

    async function checkAdminSession() {
      const { response, data } = await requestJson('/api/admin/session', {
        method: 'POST',
      });
      if (!response.ok) {
        return false;
      }
      return Boolean(data?.authenticated && data?.admin);
    }

    async function refreshSettingsCache() {
      const { response, data } = await requestJson('/api/settings/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scope: state.scope }),
      });
      if (!response.ok || !data?.success) {
        throw new Error(data?.error || '刷新失败');
      }
      state.loadFailed = false;
      state.loadErrorMessage = '';
      state.records = Array.isArray(data.records) ? data.records : [];
      hydrateAppModeRecord(state.records);
      renderRecords(state.records);
    }

    async function saveAppMode(nextValue) {
      if (!state.appModeRecord) {
        throw new Error('未找到 APP_MODE 配置项');
      }
      const { response, data } = await requestJson('/api/settings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          scope: state.appModeRecord.scope,
          setting_key: state.appModeRecord.setting_key,
          setting_value: normalizeAppMode(nextValue),
        }),
      });
      if (!response.ok || !data?.success) {
        throw new Error(data?.error || '保存失败');
      }
    }

    function renderRecords(records) {
      settingsList.innerHTML = '';
      emptyState.hidden = records.length > 0;

      for (const record of records) {
        const sensitive = Boolean(record.is_sensitive);
        const isAppMode = record.setting_key === 'APP_MODE';
        const currentValue = record.setting_value ?? '';
        const originalValue = isAppMode ? normalizeAppMode(currentValue) : currentValue;
        const previewValue = record.value_preview || (sensitive && currentValue ? '••••••••' : '');
        const valuePlaceholder = sensitive ? '当前值已隐藏，输入新值后保存' : '请输入设置值';
        const row = document.createElement('section');
        row.className = 'settings-card setting-row';
        row.dataset.scope = record.scope;
        row.dataset.key = record.setting_key;
        row.dataset.sensitive = sensitive ? 'true' : 'false';
        row.dataset.dirty = 'false';

        row.innerHTML = `
          <div class="setting-meta">
            <div class="setting-head">
              <span class="setting-scope">${escapeHtml(record.scope)}</span>
              <span class="setting-key">${escapeHtml(record.setting_key)}</span>
              ${isAppMode ? '<span class="setting-sensitive">mode switch</span>' : ''}
              ${sensitive ? '<span class="setting-sensitive">masked</span>' : ''}
              ${record.updated_at ? `<span class="setting-updated">updated ${escapeHtml(record.updated_at)}</span>` : ''}
            </div>
            <div class="setting-description">${escapeHtml(record.description || '—')}</div>
          </div>
          <div class="setting-editor">
            <div class="inline-grid">
              <label class="setting-field">
                <span class="field-label">setting_value</span>
                ${isAppMode ? `
                  <select class="setting-input setting-value-select" autocomplete="off">
                    <option value="mode1"${originalValue === 'mode1' ? ' selected' : ''}>mode1</option>
                    <option value="mode2"${originalValue === 'mode2' ? ' selected' : ''}>mode2</option>
                  </select>
                ` : `
                  <input class="setting-input setting-value-input" type="${sensitive ? 'password' : 'text'}" value="${sensitive ? '' : escapeHtml(currentValue)}" placeholder="${escapeHtml(valuePlaceholder)}" autocomplete="off" spellcheck="false">
                `}
              </label>
              <label class="setting-field">
                <span class="field-label">current preview</span>
                <input class="setting-input" type="text" value="${escapeHtml(isAppMode ? originalValue : previewValue)}" readonly tabindex="-1">
              </label>
            </div>
            <div class="setting-note">scope、setting_key 与 description 只读；保存时仅会提交 value 的变化。</div>
            <div class="setting-actions">
              <button class="btn primary setting-save-btn" type="button" disabled>保存</button>
            </div>
          </div>
        `;

        const editor = row.querySelector('.setting-value-select') || row.querySelector('.setting-value-input');
        const saveBtn = row.querySelector('.setting-save-btn');
        let originalEditorValue = originalValue;

        function syncDirty() {
          const nextValue = editor.value;
          const dirty = isAppMode ? nextValue !== originalEditorValue : (sensitive ? nextValue.length > 0 : nextValue !== originalEditorValue);
          row.dataset.dirty = dirty ? 'true' : 'false';
          saveBtn.disabled = !dirty;
        }

        editor.addEventListener('input', syncDirty);
        editor.addEventListener('change', syncDirty);
        saveBtn.addEventListener('click', async () => {
          const nextValue = editor.value;
          if (isAppMode && nextValue === originalEditorValue) {
            return;
          }
          if (!isAppMode && !sensitive && nextValue === originalEditorValue) {
            return;
          }
          if (!isAppMode && sensitive && row.dataset.dirty !== 'true') {
            return;
          }

          saveBtn.disabled = true;
          setStatus(`正在保存 ${record.setting_key}…`);

          try {
            const { response, data } = await requestJson('/api/settings', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                scope: record.scope,
                setting_key: record.setting_key,
                setting_value: nextValue,
              }),
            });
            if (!response.ok || !data?.success) {
              throw new Error(data?.error || '保存失败');
            }

            if (sensitive) {
              editor.value = '';
            } else {
              originalEditorValue = nextValue;
            }
            row.dataset.dirty = 'false';
            saveBtn.disabled = true;

            await refreshSettingsCache();
            setStatus(`${record.setting_key} 已保存`, 'success');
          } catch (error) {
            setStatus(error.message || '保存失败', 'error');
            saveBtn.disabled = false;
          }
        });

        settingsList.appendChild(row);
        syncDirty();
      }
    }

    async function loadSettings(silent = false) {
      if (!silent) {
        setStatus('正在加载设置…');
      }
      try {
        const { response, data } = await requestJson(`/api/settings?scope=${encodeURIComponent(state.scope)}`);
        if (response.status === 401) {
          state.authRequired = true;
          state.loadFailed = true;
          state.loadErrorMessage = data?.error || '请先登录';
          settingsList.innerHTML = '';
          emptyState.hidden = true;
          state.appModeRecord = null;
          state.appModeOriginalValue = 'mode1';
          appModeSelect.value = 'mode1';
          syncAppModeControls();
          showLoginGate('请先使用管理员账号登录后再加载设置。', 'error');
          setStatus('请先使用管理员账号登录后再加载设置。', 'error');
          return;
        }
        if (response.status === 403) {
          state.loadFailed = true;
          state.loadErrorMessage = data?.error || '无权访问设置页面';
          settingsList.innerHTML = '';
          emptyState.hidden = true;
          state.appModeRecord = null;
          state.appModeOriginalValue = 'mode1';
          appModeSelect.value = 'mode1';
          syncAppModeControls();
          showLoginGate('当前账号无权访问设置页面，请使用环境变量中配置的管理员账号登录。', 'error');
          setStatus(state.loadErrorMessage, 'error');
          return;
        }
        if (!response.ok || !data?.success) {
          throw new Error(data?.error || '加载失败');
        }

        showSettingsContent();
        state.loadFailed = false;
        state.loadErrorMessage = '';
        state.records = Array.isArray(data.records) ? data.records : [];
        hydrateAppModeRecord(state.records);
        renderRecords(state.records);
        if (!silent) {
          setStatus(`已加载 ${state.records.length} 条配置`, 'success');
        }
      } catch (error) {
        state.loadFailed = true;
        state.loadErrorMessage = error.message || '加载失败';
        setStatus(state.loadErrorMessage, 'error');
        settingsList.innerHTML = '';
        emptyState.hidden = false;
        state.appModeRecord = null;
        state.appModeOriginalValue = 'mode1';
        appModeSelect.value = 'mode1';
        syncAppModeControls();
      }
    }

    async function loginAsAdmin() {
      const identifier = adminIdentifierInput.value.trim();
      const password = adminPasswordInput.value;
      if (!identifier || !password) {
        setLoginStatus('请输入管理员手机号或邮箱，以及对应密码。', 'error');
        return;
      }
      adminLoginBtn.disabled = true;
      adminLoginBtn.textContent = '登录中…';
      setLoginStatus('正在验证管理员账号…');
      try {
        const { response, data } = await requestJson('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        if (!response.ok || !data?.success) {
          throw new Error(data?.error || '登录失败');
        }
        state.authRequired = false;
        adminPasswordInput.value = '';
        showSettingsContent();
        setLoginStatus('登录成功，正在加载设置…', 'success');
        await loadSettings();
      } catch (error) {
        showLoginGate(error.message || '登录失败', 'error');
      } finally {
        adminLoginBtn.disabled = false;
        adminLoginBtn.textContent = '登录并加载设置';
      }
    }

    async function bootstrap() {
      syncAppModeControls();
      if (state.authRequired) {
        showLoginGate('请先使用管理员手机号和密码登录。');
        return;
      }
      try {
        const adminLoggedIn = await checkAdminSession();
        if (adminLoggedIn) {
          showSettingsContent();
          await loadSettings();
          return;
        }
      } catch (error) {
      }
      showSettingsContent();
      await loadSettings();
    }

    appModeSelect.addEventListener('change', syncAppModeControls);
    appModeSelect.addEventListener('input', syncAppModeControls);
    appModeSaveBtn.addEventListener('click', async () => {
      if (state.loadFailed) {
        await loadSettings();
        return;
      }
      if (!state.appModeRecord) {
        setStatus('未找到 APP_MODE 配置，请先确认已登录并成功加载设置。', 'error');
        return;
      }
      const nextValue = normalizeAppMode(appModeSelect.value);
      appModeSaveBtn.disabled = true;
      appModeSaveBtn.textContent = '保存中…';
      appModeSaveBtn.classList.remove('is-idle');
      setStatus('正在保存 APP_MODE…');
      try {
        await saveAppMode(nextValue);
        await refreshSettingsCache();
        setStatus(`APP_MODE 已切换为 ${nextValue}`, 'success');
      } catch (error) {
        setStatus(error.message || '保存失败', 'error');
      } finally {
        syncAppModeControls();
      }
    });
    adminLoginBtn.addEventListener('click', loginAsAdmin);
    adminIdentifierInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        loginAsAdmin();
      }
    });
    adminPasswordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        loginAsAdmin();
      }
    });

    bootstrap();
  </script>
</body>
</html>
